services:
  # ──────────────────────────────────────────────
  # API de Streaming (FastAPI + Pyrogram)
  # ──────────────────────────────────────────────
  api-stream:
    build: .
    container_name: tl-stream-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGODB=${MONGODB_CLOUD_URI:-mongodb://mongo:27017}
    volumes:
      - ./sessions:/app/sessions # Sessões Pyrogram persistidas
    restart: unless-stopped
    networks:
      - tl-network
      - tlftpbot_default

  # ──────────────────────────────────────────────
  # Rclone — Monta HTTP remoto como FUSE local
  # ──────────────────────────────────────────────
  rclone-mount:
    image: rclone/rclone:latest
    container_name: tl-rclone-mount
    depends_on:
      - api-stream
    volumes:
      - ./rclone.conf:/config/rclone/rclone.conf:ro
      - /mnt/media/telegram:/data:shared # Ponto de montagem no host
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    command: >
      mount tl-http: /data --allow-other --allow-non-empty --vfs-cache-mode full --vfs-cache-max-age 24h --vfs-cache-max-size 5G --vfs-read-chunk-size 16M --vfs-read-chunk-size-limit 1G --buffer-size 64M --dir-cache-time 1h --poll-interval 1m --no-modtime --read-only
    restart: unless-stopped
    networks:
      - tl-network

networks:
  tl-network:
    driver: bridge
  tlftpbot_default:
    external: true
